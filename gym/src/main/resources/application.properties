spring.application.name=gym
# Database Connection
# 'localhost' works if your app is running on your machine and Docker maps 5432
spring.datasource.url=jdbc:postgresql://localhost:5432/my_healthcare
spring.datasource.username=admin
spring.datasource.password=admin
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Settings
# 'update' will automatically create/update tables based on your Java models
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Optional: Format the SQL in the console for easier reading
spring.jpa.properties.hibernate.format_sql=true